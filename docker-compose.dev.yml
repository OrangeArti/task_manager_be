services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mssql2022
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "${ACCEPT_EULA}"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P "$${MSSQL_SA_PASSWORD}" -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10

  tasks-service:
    build:
      context: .
      dockerfile: TaskManager.Api/Dockerfile
    container_name: taskmanager_tasks
    depends_on:
      mssql:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080"
      DisableHttps: "true"

      # connection string inside the compose network
      ConnectionStrings__DefaultConnection: "Server=mssql,1433;Database=TaskManagerDb;User Id=sa;Password=${MSSQL_SA_PASSWORD};Encrypt=False;TrustServerCertificate=True"

      # JWT for the container (double underscores = colon in IConfiguration)
      Jwt__Key: "${JWT_KEY}"
      Jwt__Issuer: "${JWT_ISSUER}"

      # Default admin credentials for the container
      Admin__Email: "${Admin__Email}"
      Admin__Password: "${Admin__Password}"
      Admin__DisplayName: "${Admin__DisplayName}"
    ports:
      - "8081:8080"
    restart: unless-stopped

  teams-service:
    build:
      context: .
      dockerfile: TaskManager.ServiceStub/Dockerfile
    container_name: taskmanager_teams
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080"
      SERVICE_NAME: "teams-service"
      SERVICE_KIND: "teams"
      Jwt__Key: "${JWT_KEY}"
      Jwt__Issuer: "${JWT_ISSUER}"
    ports:
      - "8082:8080"
    restart: unless-stopped

  users-service:
    build:
      context: .
      dockerfile: TaskManager.ServiceStub/Dockerfile
    container_name: taskmanager_users
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080"
      SERVICE_NAME: "users-service"
      SERVICE_KIND: "users"
      Jwt__Key: "${JWT_KEY}"
      Jwt__Issuer: "${JWT_ISSUER}"
    ports:
      - "8083:8080"
    restart: unless-stopped

  api-gateway:
    build:
      context: .
      dockerfile: TaskManager.ApiGateway/Dockerfile
    container_name: taskmanager_gateway
    depends_on:
      tasks-service:
        condition: service_started
      teams-service:
        condition: service_started
      users-service:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080"
      Gateway__Services__tasks__BaseUrl: "http://tasks-service:8080"
      Gateway__Services__teams__BaseUrl: "http://teams-service:8080"
      Gateway__Services__users__BaseUrl: "http://users-service:8080"
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  mssql_data:
    name: mssql_data
